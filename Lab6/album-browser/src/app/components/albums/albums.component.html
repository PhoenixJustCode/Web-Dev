<div class="albums-header">
  <h1>Albums</h1>
</div>

<div *ngIf="loading" class="loading-indicator">
  <div class="spinner"></div>
  <span>Loading albums...</span>
</div>

<div *ngIf="!loading && albums.length === 0" class="empty-state">
  No albums found.
</div>

<div *ngIf="!loading && albums.length > 0" class="albums-grid">
  <div
    *ngFor="let album of albums"
    class="album-card"
    [routerLink]="['/albums', album.id]"
  >
    <div class="album-info">
      <span class="album-id">#{{ album.id }}</span>
      <h3 class="album-title">{{ album.title }}</h3>
    </div>
    <div class="album-actions">
      <button class="btn-danger" (click)="deleteAlbum($event, album.id)">
        Delete
      </button>
    </div>
  </div>
</div>
